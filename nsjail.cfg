name: "sandbox"
description: "Restricted Python sandbox"
mode: ONCE
cwd: "/tmp"

exec_bin {
  path: "/usr/bin/python3"
  arg: "__EXEC_ARG__"
}

mount {
    src: "/bin"
    dst: "/bin"
	is_bind: true
}

mount {
    src: "/lib"
    dst: "/lib"
	is_bind: true
}

mount {
    src: "/lib64"
    dst: "/lib64"
	is_bind: true
    mandatory: false
}

mount {
    src: "/usr"
    dst: "/usr"
	is_bind: true
}

mount {
    src: "/etc"
    dst: "/etc"
	is_bind: true
}

mount {
  src: "/tmp"
  dst: "/tmp"
  is_bind: true
}

time_limit: 5
max_cpus: 1

rlimit_as: 512
rlimit_cpu: 5
rlimit_fsize: 10

clone_newnet: false
clone_newuser: false
clone_newns: false
clone_newpid: false
clone_newipc: false
clone_newuts: false
